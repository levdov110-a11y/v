<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Studio - Voice & Injector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>
    <style>
        body { background-color: #1e1e1e; color: #d4d4d4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .sidebar { background-color: #252526; border-left: 1px solid #3c3c3c; height: calc(100vh - 60px); }
        .editor-container { height: calc(100vh - 200px); }
        .chat-container { height: 140px; background-color: #1e1e1e; border-top: 1px solid #3c3c3c; }
        .file-item { cursor: pointer; padding: 8px 16px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .file-item:hover { background-color: #2a2d2e; }
        .file-item.active { background-color: #37373d; border-right: 3px solid #007acc; }
        .modified-badge { background-color: #d7ba7d; color: black; font-size: 0.7rem; padding: 2px 6px; border-radius: 12px; font-weight: bold; display: none; }
        .file-item.modified .modified-badge { display: block; }
        #preview-frame { width: 100%; height: 100%; background: white; border: none; display: none; }
        #monaco-editor, #monaco-diff-editor { width: 100%; height: 100%; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 50; }
        .modal-content { background: #252526; margin: 10% auto; padding: 20px; width: 50%; border: 1px solid #3c3c3c; border-radius: 8px; }
        
        /* Mic Animation */
        @keyframes pulse-red { 0% { background-color: #ef4444; } 50% { background-color: #991b1b; } 100% { background-color: #ef4444; } }
        .mic-active { animation: pulse-red 1.5s infinite; color: white !important; }
    </style>
</head>
<body class="flex flex-col h-screen text-sm">

    <!-- Header -->
    <header class="h-[60px] bg-[#333333] flex items-center justify-between px-4 shadow-md z-10">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-white tracking-wide">🤖 AI Code Studio</h1>
            <button onclick="document.getElementById('file-upload').click()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded transition shadow">
                + העלה קבצים
            </button>
            <input type="file" id="file-upload" multiple class="hidden" onchange="handleFileUpload(event)">
        </div>
        
        <div class="flex items-center gap-3">
            <select id="ai-model" class="bg-[#1e1e1e] text-white border border-[#3c3c3c] px-3 py-1.5 rounded outline-none font-semibold">
                <option value="gemini-3.1-pro-thinking">Gemini 3.1 Pro (Thinking Mode)</option>
                <option value="gemini-3.1-flash">Gemini 3.1 Flash</option>
                <option value="gemini-3.0-pro">Gemini 3.0 Pro</option>
                <option value="gemini-3.0-flash">Gemini 3.0 Flash</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
            </select>
            <button onclick="openKeyModal()" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-1.5 rounded transition flex gap-2 items-center">
                <span>🔑</span> מפתחות
            </button>
            <button onclick="runPreview()" class="bg-green-600 hover:bg-green-500 text-white px-4 py-1.5 rounded transition flex gap-2 items-center">
                <span>▶️</span> הרץ אפליקציה
            </button>
            <button onclick="togglePreview()" id="toggle-preview-btn" class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-1.5 rounded transition">
                מצב תצוגה
            </button>
        </div>
    </header>

    <!-- Workspace -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Sidebar -->
        <div class="sidebar w-64 flex-shrink-0 flex flex-col">
            <div class="p-3 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-[#3c3c3c]">
                סייר קבצים
            </div>
            <div id="file-list" class="overflow-y-auto flex-1"></div>
        </div>

        <!-- Editor Area -->
        <div class="flex-1 flex flex-col relative bg-[#1e1e1e]">
            <div class="editor-container relative">
                <div id="monaco-editor"></div>
                <div id="monaco-diff-editor" style="display: none;"></div>
                <iframe id="preview-frame"></iframe>
            </div>

            <!-- Chat Area with Voice -->
            <div class="chat-container p-4 flex flex-col gap-2 relative">
                <div class="flex justify-between items-center text-xs text-gray-400">
                    <div class="flex items-center gap-3">
                        <span>בקש מה-AI לבצע שינויים:</span>
                        <label class="flex items-center gap-1 cursor-pointer text-blue-400 hover:text-blue-300">
                            <input type="checkbox" id="voice-output-toggle" checked class="accent-blue-500 cursor-pointer">
                            <span>🔊 השמע תשובת AI</span>
                        </label>
                    </div>
                    <span id="status-text">מוכן</span>
                </div>
                <div class="flex gap-2 h-full relative">
                    <!-- Mic Button -->
                    <button id="mic-btn" onclick="toggleVoiceTyping()" class="absolute right-2 top-2 p-2 rounded-full text-gray-400 hover:text-white hover:bg-gray-700 transition" title="הקלדה קולית">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>
                    
                    <textarea id="ai-prompt" class="flex-1 bg-[#252526] border border-[#3c3c3c] text-white p-2 pr-12 rounded resize-none outline-none focus:border-blue-500" placeholder="הקלד או לחץ על המיקרופון כדי לדבר..."></textarea>
                    
                    <button onclick="processAIRequest()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 rounded transition font-bold text-lg">
                        🚀 בצע
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- API Keys Modal -->
    <div id="key-modal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl mb-4 font-bold">מפתחות API (נשמרים בזיכרון זמני בלבד)</h2>
            <textarea id="api-keys-input" class="w-full h-24 bg-[#1e1e1e] border border-[#3c3c3c] text-white p-2 rounded mb-4" placeholder="AIzaSy..., AIzaSy..."></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="closeKeyModal()" class="bg-gray-600 px-4 py-2 rounded">ביטול</button>
                <button onclick="saveKeys()" class="bg-blue-600 px-4 py-2 rounded">שמור לזיכרון</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let filesData = {}; 
        let currentActiveFile = null;
        let apiKeys = [];
        let currentKeyIndex = 0;
        let standardEditor, diffEditor, diffOriginalModel, diffModifiedModel;
        let showPreviewMode = false;

        // --- Voice Initialization (STT & TTS) ---
        let recognition = null;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'he-IL';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const promptEl = document.getElementById('ai-prompt');
                promptEl.value += (promptEl.value ? " " : "") + transcript;
            };

            recognition.onend = () => {
                isRecording = false;
                document.getElementById('mic-btn').classList.remove('mic-active');
            };
        }

        function toggleVoiceTyping() {
            if (!recognition) return alert("הדפדפן שלך אינו תומך בהקלדה קולית.");
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
                isRecording = true;
                document.getElementById('mic-btn').classList.add('mic-active');
            }
        }

        function speakAIResponse(text) {
            const isVoiceEnabled = document.getElementById('voice-output-toggle').checked;
            if (!isVoiceEnabled || !('speechSynthesis' in window)) return;
            
            // Stop current speech if any
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'he-IL';
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // --- Monaco Editor ---
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            standardEditor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: "// המערכת מוכנה. העלה קבצים כדי להתחיל...", theme: 'vs-dark', automaticLayout: true
            });
            diffEditor = monaco.editor.createDiffEditor(document.getElementById('monaco-diff-editor'), {
                theme: 'vs-dark', automaticLayout: true, readOnly: true 
            });
        });

        // --- File Handling ---
        function getLanguage(filename) {
            if (filename.endsWith('.html')) return 'html';
            if (filename.endsWith('.css')) return 'css';
            if (filename.endsWith('.js')) return 'javascript';
            if (filename.endsWith('.json')) return 'json';
            return 'plaintext';
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            for (let file of files) {
                const text = await file.text();
                filesData[file.name] = { original: text, modified: text, isModified: false, language: getLanguage(file.name) };
            }
            renderFileList();
            if (files.length > 0 && !currentActiveFile) openFile(files[0].name);
        }

        function renderFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            for (let filename in filesData) {
                const div = document.createElement('div');
                div.className = `file-item ${currentActiveFile === filename ? 'active' : ''} ${filesData[filename].isModified ? 'modified' : ''}`;
                div.onclick = () => openFile(filename);
                div.innerHTML = `<span class="truncate" dir="ltr">${filename}</span><span class="modified-badge">שונה (Diff)</span>`;
                list.appendChild(div);
            }
        }

        function openFile(filename) {
            currentActiveFile = filename;
            renderFileList();
            showPreviewMode = false;
            document.getElementById('preview-frame').style.display = 'none';

            const file = filesData[filename];
            if (file.isModified) {
                document.getElementById('monaco-editor').style.display = 'none';
                document.getElementById('monaco-diff-editor').style.display = 'block';
                if (!diffOriginalModel) diffOriginalModel = monaco.editor.createModel(file.original, file.language); else diffOriginalModel.setValue(file.original);
                if (!diffModifiedModel) diffModifiedModel = monaco.editor.createModel(file.modified, file.language); else diffModifiedModel.setValue(file.modified);
                diffEditor.setModel({ original: diffOriginalModel, modified: diffModifiedModel });
            } else {
                document.getElementById('monaco-editor').style.display = 'block';
                document.getElementById('monaco-diff-editor').style.display = 'none';
                standardEditor.setValue(file.original);
                monaco.editor.setModelLanguage(standardEditor.getModel(), file.language);
            }
        }

        // --- API Keys ---
        function openKeyModal() { document.getElementById('key-modal').style.display = 'block'; }
        function closeKeyModal() { document.getElementById('key-modal').style.display = 'none'; }
        function saveKeys() {
            apiKeys = document.getElementById('api-keys-input').value.split(',').map(k => k.trim()).filter(k => k !== '');
            currentKeyIndex = 0;
            alert(`נשמרו ${apiKeys.length} מפתחות בזיכרון.`);
            document.getElementById('api-keys-input').value = '';
            closeKeyModal();
        }

        // --- AI & Smart Injection ---
        function setStatus(text, color="gray") {
            const el = document.getElementById('status-text');
            el.innerText = text; el.style.color = color;
        }

        async function processAIRequest() {
            const prompt = document.getElementById('ai-prompt').value;
            if (!prompt) return alert("אנא כתוב או אמור למיקרופון מה תרצה לשנות");
            if (Object.keys(filesData).length === 0) return alert("אנא העלה קבצים קודם");
            if (apiKeys.length === 0) return alert("אנא הזן מפתחות API קודם");

            const model = document.getElementById('ai-model').value;
            let filesContext = "Current Files:\n";
            for (let f in filesData) { filesContext += `--- FILE: ${f} ---\n${filesData[f].modified}\n\n`; }

            const systemInstruction = `
You are an expert programmer. Modify the user's code.
CRITICAL: To save tokens, output ONLY the exact lines to search for and replace.
Return ONLY a valid JSON object. NO markdown formatting.
Format MUST be:
{
  "message": "A very short, friendly summary IN HEBREW of what you successfully changed.",
  "changes": [
    {
      "filename": "file name here",
      "search": "exact string to find (include enough context)",
      "replace": "the new string"
    }
  ]
}
`;
            const fullPrompt = `${systemInstruction}\n\n${filesContext}\n\nUser Request: ${prompt}`;
            setStatus("חושב, מנתח וכותב קוד...", "orange");

            try {
                let aiResponseJson = await fetchWithKeyRotation(model, fullPrompt);
                
                // Speak the AI's response message
                if(aiResponseJson.message) {
                    speakAIResponse(aiResponseJson.message);
                }

                // Apply changes
                if(aiResponseJson.changes && aiResponseJson.changes.length > 0) {
                    applySmartInjection(aiResponseJson.changes);
                } else {
                    setStatus("ה-AI הגיב, אך לא נמצאו שינויים להזרקה בקוד.", "yellow");
                }
                
            } catch (error) {
                setStatus("שגיאה: " + error.message, "red");
                console.error(error);
            }
        }

        async function fetchWithKeyRotation(model, prompt) {
            while (currentKeyIndex < apiKeys.length) {
                const key = apiKeys[currentKeyIndex];
                // Using the standard URL structure, assuming future models follow the same v1beta path
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.2 }
                    })
                });

                if (res.status === 429) {
                    currentKeyIndex++;
                    continue; 
                }
                if (!res.ok) throw new Error(`API Error: ${res.status}`);

                const data = await res.json();
                let textResult = data.candidates[0].content.parts[0].text;
                textResult = textResult.replace(/```json/g, '').replace(/```/g, '').trim();
                return JSON.parse(textResult);
            }
            throw new Error("כל מפתחות ה-API נוצלו או חסומים.");
        }

        function applySmartInjection(changesArray) {
            let changesMade = 0;
            for (let change of changesArray) {
                const file = filesData[change.filename];
                if (!file) continue;

                if (file.modified.includes(change.search)) {
                    file.modified = file.modified.replace(change.search, change.replace);
                    file.isModified = true;
                    changesMade++;
                }
            }

            if (changesMade > 0) {
                setStatus(`הוזרקו ${changesMade} שינויים בהצלחה!`, "#00ff00");
                renderFileList();
                if (currentActiveFile) openFile(currentActiveFile);
            } else {
                setStatus("הקוד לא מצא את השורות המדויקות להחלפה.", "yellow");
            }
        }

        // --- Live Preview ---
        function togglePreview() {
            showPreviewMode = !showPreviewMode;
            if (showPreviewMode) { runPreview(); } 
            else {
                document.getElementById('preview-frame').style.display = 'none';
                if (currentActiveFile) openFile(currentActiveFile);
            }
        }

        function runPreview() {
            showPreviewMode = true;
            document.getElementById('monaco-editor').style.display = 'none';
            document.getElementById('monaco-diff-editor').style.display = 'none';
            const iframe = document.getElementById('preview-frame');
            iframe.style.display = 'block';

            let htmlContent = "", cssContent = "", jsContent = "";
            for (let f in filesData) {
                if (f.endsWith('.html')) htmlContent += filesData[f].modified;
                if (f.endsWith('.css')) cssContent += filesData[f].modified;
                if (f.endsWith('.js')) jsContent += filesData[f].modified;
            }

            iframe.srcdoc = `
                <!DOCTYPE html><html><head><style>${cssContent}</style></head>
                <body>${htmlContent || "<h1>לא נמצא קובץ HTML</h1>"}<script>${jsContent}<\/script></body></html>
            `;
            setStatus("מצב תצוגה מקדימה", "lightblue");
        }
    </script>
</body>
</html>
